<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Documentos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tela-login" style="position: fixed; top:0; left:0; width:100vw; height:100vh; background:#222; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index: 9999;">
        <h2>Acesso ao Sistema</h2>
        <form id="form-login" style="display:flex; flex-direction:column; gap:10px; width:250px;">
            <input type="text" id="login-usuario" placeholder="Nome de Usuário" required style="padding:10px;">
            <input type="password" id="login-pin" placeholder="PIN (Apenas números)" required style="padding:10px;">
            <button type="submit" style="padding:10px; background:#4ca374; color:white; border:none; cursor:pointer;">Entrar</button>
        </form>
    </div>

    <div id="conteudo-sistema" style="display: none; padding: 20px;">
        <h1>Painel do Escritório</h1>
        
        <form id="form-cliente">
            <input type="text" id="nome" placeholder="Nome do Cliente" required>
            <input type="text" id="documento" placeholder="CPF/CNPJ">
            <button type="submit">Salvar Cliente</button>
        </form>
        <ul id="lista-clientes"></ul>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
